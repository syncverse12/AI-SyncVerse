version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
      - CORS_ORIGINS=*
      - CORS_ALLOW_CREDENTIALS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
