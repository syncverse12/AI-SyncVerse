version: "3.9"

services:
  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build: .
    command: >
      celery -A app.workers.tasks.celery_app worker
      --loglevel=info
      --queues=risk_refresh,indexing,bulk
      --concurrency=4
    env_file: .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────
  beat:
    build: .
    command: celery -A app.workers.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: syncverse
      POSTGRES_PASSWORD: syncverse
      POSTGRES_DB: risk_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncverse"]
      interval: 10s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  # ── Qdrant ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
